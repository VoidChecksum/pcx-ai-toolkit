name: Build and Release Extensions

# Builds both VS Code and Visual Studio 2022 extensions, then attaches them
# to a single unified GitHub Release when a version tag (v*) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vscode:
    name: Build VS Code Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with LSP submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build and package enma-lsp
        working-directory: lsp/enma-lsp
        run: |
          npm install
          npm run compile
          vsce package --allow-missing-repository --skip-license

      - name: Build and package angel-lsp-pcx
        working-directory: lsp/angel-lsp-pcx
        run: |
          npm install
          npm run compile
          vsce package --allow-missing-repository --skip-license

      - name: Collect VS Code artifacts
        run: |
          mkdir -p dist
          cp lsp/enma-lsp/*.vsix dist/
          cp lsp/angel-lsp-pcx/*.vsix dist/

      - name: Upload VS Code VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vs-code-vsix
          path: dist/*.vsix
          retention-days: 1

  build-visualstudio:
    name: Build Visual Studio 2022 Extensions
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Enma language server
        working-directory: lsp/enma-lsp
        run: |
          npm install
          npm run compile

      - name: Build AngelScript language server
        working-directory: lsp/angel-lsp-pcx
        run: |
          npm install
          npm run compile

      - name: Stage Enma server payload
        shell: pwsh
        run: |
          $dst = "visualstudio/EnmaVS/Server"
          New-Item -ItemType Directory -Force -Path "$dst/bin", "$dst/server/dist" | Out-Null
          Copy-Item -Recurse -Force lsp/enma-lsp/bin/*          "$dst/bin/"
          Copy-Item -Recurse -Force lsp/enma-lsp/server/dist/*  "$dst/server/dist/"

      - name: Stage AngelScript server payload
        shell: pwsh
        run: |
          $dst = "visualstudio/AngelScriptVS/Server"
          New-Item -ItemType Directory -Force -Path "$dst/out", "$dst/node_modules" | Out-Null
          Copy-Item -Recurse -Force lsp/angel-lsp-pcx/server/out/*       "$dst/out/"
          Copy-Item -Force          lsp/angel-lsp-pcx/server/package.json "$dst/package.json"
          Get-ChildItem -Directory lsp/angel-lsp-pcx/server/node_modules -Filter "vscode-*" | ForEach-Object {
            Copy-Item -Recurse -Force $_.FullName "$dst/node_modules/$($_.Name)"
          }

      - name: Restore NuGet packages
        run: |
          nuget restore visualstudio/EnmaVS/EnmaVS.csproj -PackagesDirectory packages
          nuget restore visualstudio/AngelScriptVS/AngelScriptVS.csproj -PackagesDirectory packages

      - name: Build Enma VSIX
        run: msbuild visualstudio/EnmaVS/EnmaVS.csproj /p:Configuration=Release /p:DeployExtension=false /restore

      - name: Build AngelScript VSIX
        run: msbuild visualstudio/AngelScriptVS/AngelScriptVS.csproj /p:Configuration=Release /p:DeployExtension=false /restore

      - name: Collect VS artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Recurse -Filter *.vsix visualstudio | ForEach-Object {
            Copy-Item $_.FullName "dist/$($_.Name)"
          }

      - name: Upload Visual Studio VSIX
        uses: actions/upload-artifact@v4
        with:
          name: visual-studio-vsix
          path: dist/*.vsix
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-vscode, build-visualstudio]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VS Code VSIX
        uses: actions/download-artifact@v4
        with:
          name: vs-code-vsix
          path: release-artifacts

      - name: Download Visual Studio VSIX
        uses: actions/download-artifact@v4
        with:
          name: visual-studio-vsix
          path: release-artifacts

      - name: List collected artifacts
        run: ls -lh release-artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.vsix
          generate_release_notes: true
          body: |
            ## VS Code & Visual Studio Extensions

            ### VS Code (Drag-and-Drop)
            1. Download `enma-language-*.vsix` (Enma) or `angel-lsp-*.vsix` (AngelScript).
            2. In VS Code, run **Extensions: Install from VSIX...** from the command palette.

            ### Visual Studio 2022
            1. Download `PcxEnmaVS-*.vsix` or `PcxAngelScriptVS-*.vsix`.
            2. Double-click the downloaded file to run the VSIX Installer.

            All extensions are MIT-licensed builds of [enma-lsp](https://github.com/sinnafuls/enma-lsp) and [angel-lsp-pcx](https://github.com/sinnafuls/angel-lsp-pcx).
