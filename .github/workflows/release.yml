name: Build and Release Toolkit

# Builds Enma VS Code and Visual Studio 2022 extensions plus the Rust CLI, then
# attaches them to one GitHub Release when a version tag (v*) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-vscode:
    name: Build Enma VS Code Extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with LSP submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build and package enma-lsp
        working-directory: lsp/enma-lsp
        run: |
          npm install
          npm run compile
          vsce package --allow-missing-repository --skip-license


      - name: Collect VS Code artifacts
        run: |
          mkdir -p dist
          cp lsp/enma-lsp/*.vsix dist/

      - name: Upload VS Code VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vs-code-vsix
          path: dist/*.vsix
          retention-days: 1


  build-rust-cli:
    name: Build Rust CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build pcx-rs
        working-directory: tools/pe-parser
        run: cargo build --release --bin pcx-rs

      - name: Stage pcx-rs
        run: |
          mkdir -p dist
          cp tools/pe-parser/target/release/pcx-rs dist/pcx-rs

      - name: Upload Rust CLI
        uses: actions/upload-artifact@v4
        with:
          name: rust-cli
          path: dist/pcx-rs
          retention-days: 1

  publish-pypi:
    name: Publish root PyPI package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build Rust CLI for package
        working-directory: tools/pe-parser
        run: cargo build --release --bin pcx-rs

      - name: Stage Rust CLI for package
        run: |
          mkdir -p pcx-bin
          cp tools/pe-parser/target/release/pcx-rs pcx-bin/pcx-rs
          cp tools/pe-parser/target/release/pcx-rs pcx-bin/pcx-rs.exe

      - name: Build root Python package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Upload root Python package
        uses: actions/upload-artifact@v4
        with:
          name: root-python-package
          path: dist/*
          retention-days: 1


      - name: Check PyPI version availability
        id: pypi-version
        run: |
          if python -m pip index versions pcx-ai-toolkit | grep -q "$(cat VERSION)"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish root Python package to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.pypi-version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm trusted publishing CLI
        run: npm install -g npm@latest

      - name: Build Rust CLI for package
        working-directory: tools/pe-parser
        run: cargo build --release --bin pcx-rs

      - name: Stage Rust CLI for package
        run: |
          mkdir -p pcx-bin
          cp tools/pe-parser/target/release/pcx-rs pcx-bin/pcx-rs
          cp tools/pe-parser/target/release/pcx-rs pcx-bin/pcx-rs.exe

      - name: Build npm package
        run: |
          echo "npm-version=$(npm --version)"
          npm pack --dry-run
          npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: pcx-ai-toolkit-*.tgz
          retention-days: 1


      - name: Check npm version availability
        id: npm-version
        run: |
          if npm view "pcx-ai-toolkit@$(cat VERSION)" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish npm package
        if: startsWith(github.ref, 'refs/tags/v') && steps.npm-version.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
  build-visualstudio:
    name: Build Enma Visual Studio 2022 Extension
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Enma language server
        working-directory: lsp/enma-lsp
        run: |
          npm install
          npm run compile


      - name: Stage Enma server payload
        shell: pwsh
        run: |
          $dst = "visualstudio/EnmaVS/Server"
          New-Item -ItemType Directory -Force -Path "$dst/bin", "$dst/server/dist" | Out-Null
          Copy-Item -Recurse -Force lsp/enma-lsp/bin/*          "$dst/bin/"
          Copy-Item -Recurse -Force lsp/enma-lsp/server/dist/*  "$dst/server/dist/"


      - name: Restore NuGet packages
        run: |
          nuget restore visualstudio/EnmaVS/EnmaVS.csproj -PackagesDirectory packages

      - name: Build Enma VSIX
        run: msbuild visualstudio/EnmaVS/EnmaVS.csproj /p:Configuration=Release /p:DeployExtension=false /restore


      - name: Collect VS artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Recurse -Filter *.vsix visualstudio | ForEach-Object {
            Copy-Item $_.FullName "dist/$($_.Name)"
          }

      - name: Upload Visual Studio VSIX
        uses: actions/upload-artifact@v4
        with:
          name: visual-studio-vsix
          path: dist/*.vsix
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-vscode, build-visualstudio, build-rust-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VS Code VSIX
        uses: actions/download-artifact@v4
        with:
          name: vs-code-vsix
          path: release-artifacts

      - name: Download Visual Studio VSIX
        uses: actions/download-artifact@v4
        with:
          name: visual-studio-vsix
          path: release-artifacts

      - name: Download Rust CLI
        uses: actions/download-artifact@v4
        with:
          name: rust-cli
          path: release-artifacts

      - name: List collected artifacts
        run: ls -lh release-artifacts/

      - name: Generate artifact checksums
        run: |
          cd release-artifacts
          sha256sum *.vsix > SHA256SUMS.txt
          sha256sum pcx-rs >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/sbom.spdx.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-artifacts/*.vsix
            release-artifacts/pcx-rs
            release-artifacts/SHA256SUMS.txt
            release-artifacts/sbom.spdx.json

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.vsix
            release-artifacts/SHA256SUMS.txt
            release-artifacts/pcx-rs
            release-artifacts/sbom.spdx.json
          generate_release_notes: true
          body: |
            ## PCX Toolkit Release

            ### VS Code (Drag-and-Drop)
            1. Download `enma-language-*.vsix`.
            2. In VS Code, run **Extensions: Install from VSIX...** from the command palette.

            ### Visual Studio 2022
            1. Download `PcxEnmaVS-*.vsix`.
            2. Double-click the downloaded file to run the VSIX Installer.

            ### Package Managers
            - PyPI: `python -m pip install pcx-ai-toolkit`
            - npm: `npm install -g pcx-ai-toolkit`
            - Bun: `bun add -g pcx-ai-toolkit`

            ### Rust CLI
            Download `pcx-rs` for native validation, MCP stdio, and API lookup commands.

            All extensions are MIT-licensed builds of [enma-lsp](https://github.com/VoidChecksum/enma-lsp).
