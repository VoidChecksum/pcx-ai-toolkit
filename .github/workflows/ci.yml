name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell tools syntax
        run: |
          bash -n setup.sh
          for f in tools/*.sh; do bash -n "$f"; done

      - name: Build Rust tools
        working-directory: tools/pe-parser
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test --manifest-path tools/pe-parser/Cargo.toml

      - name: Run Rust smoke tests
        run: ./tools/test-runner.sh

  build-lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build enma-lsp
        working-directory: lsp/enma-lsp
        run: npm install && npm run compile && test -f server/dist/server.js
