name: CI

# Validate the toolkit on every push / PR: shell + PowerShell syntax,
# JSON/YAML validity, and that both LSP servers actually build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate setup.sh syntax
        run: bash -n setup.sh
      - name: Validate update-toolkit.sh syntax
        run: bash -n tools/update-toolkit.sh

      - name: Validate update-toolkit.ps1 (PowerShell parser)
        shell: pwsh
        run: |
          $errs = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/tools/update-toolkit.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count -gt 0) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "update-toolkit.ps1 OK"

      - name: Validate shell tools syntax
        run: |
          for f in tools/*.sh; do bash -n "$f" || { echo "Syntax error: $f"; exit 1; }; done
          echo "All shell tools valid"

      - name: Validate Python tools syntax
        run: |
          for f in tools/*.py tools/lib/*.py; do
            python3 -m py_compile "$f" || { echo "Syntax error: $f"; exit 1; }
          done
          echo "All Python tools valid"

      - name: Install mypy and pyright
        run: pip install mypy pyright

      - name: Static type check (mypy)
        run: mypy tools/

      - name: Static type check (pyright)
        run: pyright

      - name: Build Rust tools
        working-directory: tools/pe-parser
        run: |
          cargo build --release
          mkdir -p ../bin
          cp target/release/pe-parser ../bin/pe-parser

      - name: Run smoke tests
        run: ./tools/test-runner.sh

      - name: Check VERSION file exists
        run: |
          test -f VERSION && echo "VERSION: $(cat VERSION)"

      - name: Validate setup.ps1 (PowerShell parser)
        shell: pwsh
        run: |
          $errs = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/setup.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count -gt 0) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "setup.ps1 OK"

      - name: Validate JSON configs
        run: |
          for f in $(find . -path ./lsp -prune -o -name '*.json' -print); do
            python3 -c "import json,sys; json.load(open('$f'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON valid"

      - name: Validate YAML
        run: |
          python3 - <<'PY'
          import sys, glob
          try:
              import yaml
          except ImportError:
              import subprocess; subprocess.run([sys.executable,"-m","pip","install","-q","pyyaml"]); import yaml
          for f in glob.glob(".github/**/*.yml", recursive=True) + glob.glob("*.yml"):
              yaml.safe_load(open(f))
          print("All YAML valid")
          PY

      - name: Check docs/COUNTS.json in sync with the tree
        run: python3 tools/build-counts.py --check

      - name: Check llms-index bundles in sync (build-llms-index.py --check)
        run: |
          python3 tools/build-llms-index.py --check || {
            echo "Drift detected! Showing differences:"
            python3 tools/build-llms-index.py
            git diff
            exit 1
          }

      - name: Check docs/PROVENANCE.json in sync with the tree
        run: python3 tools/build-provenance.py --check

      - name: Check MCP config in sync with mcp-api.md (compatibility gate)
        run: python3 tools/check-mcp-config.py --check

      - name: Version-matrix drift advisory (changelogs vs pcx-version-matrix.md)
        run: python3 tools/check-version-matrix.py || true   # advisory — prints WARN, never fails the build

      - name: Dogfood — lint the toolkit's own templates
        run: |
          set -e
          for f in templates/*.em; do
            [ -f "$f" ] && python3 tools/script-linter.py --strict "$f"
          done
          echo "All templates pass the toolkit's own linter (--strict)"

      - name: Validate skill frontmatter (name + description + license in every SKILL.md)
        run: |
          python3 - <<'PY'
          import glob, sys
          errors = []
          for path in sorted(glob.glob('.claude/skills/*/SKILL.md')):
              txt = open(path, encoding='utf-8').read()
              if not txt.startswith('---'):
                  errors.append(f"{path}: missing YAML frontmatter")
                  continue
              end = txt.find('\n---', 3)
              if end == -1:
                  errors.append(f"{path}: frontmatter not closed")
                  continue
              block = txt[3:end]
              for field in ('name:', 'description:', 'license:'):
                  if field not in block:
                      errors.append(f"{path}: missing field '{field}'")
              skill_dir = path.split('/')[2]
              for line in block.splitlines():
                  if line.startswith('name:'):
                      name_val = line.split(':', 1)[1].strip().strip('"\'')
                      if name_val != skill_dir:
                          errors.append(f"{path}: name '{name_val}' != dir '{skill_dir}'")
          if errors:
              print(f"Skill frontmatter errors ({len(errors)}):")
              for e in errors: print(f"  {e}")
              sys.exit(1)
          count = len(glob.glob('.claude/skills/*/SKILL.md'))
          print(f"All {count} skills have valid frontmatter")
          PY

      - name: Check internal markdown links
        run: |
          python3 - <<'PY'
          import re, os, glob, urllib.parse, sys
          link_re = re.compile(r'\[[^\]]*\]\(([^)]+)\)')
          code_fence = re.compile(r'```[\s\S]*?```', re.MULTILINE)
          broken = []
          for md in glob.glob('**/*.md', recursive=True):
              if md.startswith('lsp/'): continue
              # Skip generated bundles — they concatenate files from many dirs,
              # so relative links inside no longer resolve relative to docs/.
              # The source files those links live in ARE checked individually.
              if md.startswith('docs/llms-'): continue
              d = os.path.dirname(md)
              try: txt = open(md, encoding='utf-8', errors='ignore').read()
              except: continue
              clean = code_fence.sub('', txt)
              for m in link_re.finditer(clean):
                  tgt = m.group(1).strip()
                  if tgt.startswith(('http://','https://','#','mailto:','skill://')): continue
                  tgt_clean = urllib.parse.unquote(tgt.split('#')[0].strip())
                  if not tgt_clean or ' ' in tgt_clean: continue
                  # Skip bare identifiers (code syntax, not file paths)
                  if '/' not in tgt_clean and '.' not in tgt_clean: continue
                  p = os.path.normpath(os.path.join(d, tgt_clean))
                  if not os.path.exists(p):
                      broken.append(f"  {md} -> {tgt_clean}")
          if broken:
              print(f"Broken internal links ({len(broken)}):")
              for b in broken: print(b)
              sys.exit(1)
          print("All internal links valid")
          PY

  build-lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build enma-lsp
        working-directory: lsp/enma-lsp
        run: npm install && npm run compile && test -f server/dist/server.js

      - name: Build angel-lsp-pcx
        working-directory: lsp/angel-lsp-pcx
        run: npm install && npm run compile && test -f server/out/server.js
