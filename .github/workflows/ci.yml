name: CI

# Validate the toolkit on every push / PR: shell + PowerShell syntax,
# JSON/YAML validity, static type checks, generated-file sync, doc drift,
# API index sync, and the toolkit's own smoke tests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Validate setup.sh syntax
        run: bash -n setup.sh
      - name: Validate update-toolkit.sh syntax
        run: bash -n tools/update-toolkit.sh

      - name: Validate update-toolkit.ps1 (PowerShell parser)
        shell: pwsh
        run: |
          $errs = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/tools/update-toolkit.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count -gt 0) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "update-toolkit.ps1 OK"

      - name: Validate shell tools syntax
        run: |
          for f in tools/*.sh; do bash -n "$f" || { echo "Syntax error: $f"; exit 1; }; done
          echo "All shell tools valid"

      - name: Validate Python tools syntax
        run: |
          for f in tools/*.py tools/lib/*.py mcp/pcx-knowledge-mcp/server.py tests/*.py; do
            python3 -m py_compile "$f" || { echo "Syntax error: $f"; exit 1; }
          done
          echo "All Python tools valid"

      - name: Check internal markdown links
        run: python3 tools/check-internal-links.py

      - name: Install type-checker dependencies
        run: pip install -q mypy pyright

      - name: MCP server launch smoke
        run: |
          python3 -m pip install -q mcp
          python3 mcp/pcx-knowledge-mcp/server.py --help

      - name: Static type check (mypy)
        run: mypy tools/

      - name: Static type check (pyright)
        run: pyright

      - name: Build Rust tools
        working-directory: tools/pe-parser
        run: |
          cargo build --release
          mkdir -p ../bin
          for tool in pe-parser pcx-rs api-lookup pattern-format-converter sig-uniqueness-checker binary-diff-summary offset-diff anti-debug-scanner identify-protector pe-section-analyzer analyze-vmprotect dump-strings-xor module-export-mapper; do
            cp "target/release/$tool" "../bin/$tool"
          done

      - name: Run Rust tests
        run: cargo test --manifest-path tools/pe-parser/Cargo.toml

      - name: Run smoke tests
        run: ./tools/test-runner.sh

      - name: Check VERSION file exists
        run: |
          test -f VERSION && echo "VERSION: $(cat VERSION)"

      - name: Validate setup.ps1 (PowerShell parser)
        shell: pwsh
        run: |
          $errs = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/setup.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count -gt 0) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "setup.ps1 OK"

      - name: Validate JSON configs
        run: |
          for f in $(find . -path ./lsp -prune -o -name '*.json' -print); do
            python3 -c "import json,sys; json.load(open('$f'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON valid"

      - name: Validate YAML
        run: |
          python3 - <<'PY'
          import sys, glob
          try:
              import yaml
          except ImportError:
              import subprocess; subprocess.run([sys.executable,"-m","pip","install","-q","pyyaml"]); import yaml
          for f in glob.glob(".github/**/*.yml", recursive=True) + glob.glob("*.yml"):
              yaml.safe_load(open(f))
          print("All YAML valid")
          PY

      - name: Check docs/COUNTS.json in sync with the tree
        run: python3 tools/build-counts.py --check

      - name: Check llms-index bundles in sync (build-llms-index.py --check)
        run: |
          python3 tools/build-llms-index.py --check || {
            echo "Drift detected! Showing differences:"
            python3 tools/build-llms-index.py
            git diff
            exit 1
          }

      - name: Check LLM routing contract
        run: python3 tools/check-llm-contract.py

      - name: Check skill and AI-doc contracts
        run: python3 tools/check-skill-contract.py

      - name: Check docs/PROVENANCE.json in sync with the tree
        run: python3 tools/build-provenance.py --check

      - name: Check API index in sync with upstream (live)
        run: |
          for i in 1 2 3; do
            python3 tools/build-api-index.py --check && break
            echo "API index check attempt $i failed; retrying in 5s..."
            sleep 5
          done

      - name: Run unittest regression tests
        run: python3 -m unittest discover -s tests -v

      - name: Dogfood — symbol-check all templates and examples
        run: |
          set -e
          python3 tools/symbol-check.py templates
          python3 tools/symbol-check.py examples
          echo "All templates/examples pass source-backed symbol-check"

      - name: Dogfood — source-backed API oracle
        run: |
          python3 tools/api-lookup.py draw_text --json

      - name: Dogfood — LLM answer code-block checker
        run: |
          cat > /tmp/pcx-answer.md <<'MD'
          ```enma
          int64 main() {
              println("hello");
              return 1;
          }
          ```
          MD
          python3 tools/check-llm-answer.py /tmp/pcx-answer.md

      - name: Dogfood — hallucination regression benchmark
        run: python3 tools/hallucination-eval.py

      - name: Dogfood — project scaffolding and verification
        run: |
          set -e
          tmp="$(mktemp -d)"
          python3 tools/pcx.py create --name "CI Enma" --language enma --kind full --target ci.exe --output "$tmp/ci-enma"
          python3 tools/verify-project.py "$tmp/ci-enma" --allow-placeholders --allow-unverified
          rm -rf "$tmp"

      - name: Dogfood — RE importer smoke
        run: |
          printf 'name,address,kind\nLocalPlayer,0x1234,symbol\n' \
            | python3 tools/re-importer.py --format ida-names --out-format enma-offsets - \
            | grep -q 'OFF_LOCALPLAYER'

      - name: Check MCP config in sync with mcp-api.md (compatibility gate)
        run: python3 tools/check-mcp-config.py --check
      - name: Check uncommitted generated files
        run: |
          # Regenerate everything and fail if anything changed.
          python3 tools/build-counts.py
          python3 tools/build-llms-index.py
          python3 tools/build-api-index.py
          python3 tools/build-provenance.py
          # Provenance includes live-regenerated API-index hashes; verify it above, but
          # keep this dirty-tree gate focused on deterministic generated artifacts.
          git checkout -- docs/PROVENANCE.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: generated files are out of sync with the tree/workspace:"
            git status --short
            git diff --stat
            exit 1
          fi
          echo "All generated files are committed"


      - name: Dogfood — project-verify templates and examples
        run: |
          set -e
          python3 tools/verify-project.py templates --allow-placeholders --allow-unverified
          python3 tools/verify-project.py examples --allow-placeholders --allow-unverified
          echo "All templates/examples pass project verification in scaffold mode"

      - name: Validate skill frontmatter (name + description + license in every SKILL.md)
        run: |
          python3 - <<'PY'
          import glob, sys
          errors = []
          for path in sorted(glob.glob('.claude/skills/*/SKILL.md')):
              txt = open(path, encoding='utf-8').read()
              if not txt.startswith('---'):
                  errors.append(f"{path}: missing YAML frontmatter")
                  continue
              end = txt.find('\n---', 3)
              if end == -1:
                  errors.append(f"{path}: frontmatter not closed")
                  continue
              block = txt[3:end]
              for field in ('name:', 'description:', 'license:'):
                  if field not in block:
                      errors.append(f"{path}: missing field '{field}'")
              skill_dir = path.split('/')[2]
              for line in block.splitlines():
                  if line.startswith('name:'):
                      name_val = line.split(':', 1)[1].strip().strip('"\'')
                      if name_val != skill_dir:
                          errors.append(f"{path}: name '{name_val}' != dir '{skill_dir}'")
          if errors:
              print(f"Skill frontmatter errors ({len(errors)}):")
              for e in errors: print(f"  {e}")
              sys.exit(1)
          count = len(glob.glob('.claude/skills/*/SKILL.md'))
          print(f"All {count} skills have valid frontmatter")
          PY


  build-lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build enma-lsp
        working-directory: lsp/enma-lsp
        run: npm install && npm run compile && test -f server/dist/server.js
