name: Documentation Drift

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build pcx-rs
        working-directory: tools/pe-parser
        run: cargo build --release --bin pcx-rs

      - name: Check offline drift snapshot
        run: tools/pe-parser/target/release/pcx-rs check-drift --json --limit 20
