name: Feature Request
description: Suggest a new pattern, template, integration, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New code pattern / template
        - New AI tool integration (Cline, Windsurf, etc.)
        - New engine signature collection
        - New knowledge base article
        - AI skill improvement
        - MCP integration
        - LSP improvement
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example (optional)
      description: Show what the end result would look like
